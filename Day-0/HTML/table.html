<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
</head>
<body>

    <table border="1">
        <caption>Student Data</caption>

        <colgroup>
            <col style="background-color: grey;">
            <col style="background-color: skyblue;">
        </colgroup>

        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Anubhav</td>
                <td>24</td>
            </tr>
            <tr>
                <td>Rahul</td>
                <td>23</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">End of Data</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
